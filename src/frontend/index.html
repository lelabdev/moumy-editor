<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Moumy — Éditeur de recettes</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; }
    .tree-toggle { cursor: pointer; user-select: none; }
    .tree-toggle:hover { background-color: #fef3c7; }
    .tree-children { overflow: hidden; }
    .tree-children.collapsed { display: none; }
    .tree-recipe:hover { background-color: #fef3c7; }
    .tree-recipe.active { background-color: #fde68a; }
    .chevron { transition: transform 0.15s; display: inline-block; }
    .chevron.collapsed { transform: rotate(-90deg); }
    .step-input { counter-increment: step; }
    .step-input::before { content: counter(step) ". "; font-weight: 600; color: #8B6F5C; }
    .step-list { counter-reset: step; }
    .category-tag { font-size: 0.7rem; padding: 2px 8px; border-radius: 9999px; }
  </style>
</head>
<body class="bg-stone-50 min-h-screen">

  <!-- Header -->
  <header class="bg-white border-b border-stone-200 px-6 py-4 flex items-center justify-between">
    <h1 class="text-xl font-bold text-stone-800">📝 Moumy — Recettes</h1>
    <button onclick="showNewRecipe()" class="bg-amber-600 hover:bg-amber-700 text-white px-4 py-2 rounded-lg text-sm font-medium">
      + Nouvelle recette
    </button>
  </header>

  <!-- Main layout -->
  <div class="flex h-[calc(100vh-65px)]">

    <!-- Sidebar: tree view by category -->
    <aside id="sidebar" class="w-80 bg-white border-r border-stone-200 flex flex-col">
      <div class="p-4">
        <input type="text" id="search" placeholder="Rechercher..." oninput="filterRecipes()"
          class="w-full px-3 py-2 border border-stone-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-amber-500">
      </div>
      <div id="recipe-tree" class="flex-1 overflow-y-auto"></div>
    </aside>

    <!-- Main content: form -->
    <main id="main" class="flex-1 overflow-y-auto">
      <div id="empty-state" class="flex items-center justify-center h-full text-stone-400">
        <p>Sélectionnez ou créez une recette</p>
      </div>
      <div id="form-container" class="hidden max-w-2xl mx-auto p-8">
        <form id="recipe-form" onsubmit="saveRecipe(event)">
          <input type="hidden" id="form-slug">

          <!-- Title -->
          <div class="mb-6">
            <label class="block text-sm font-medium text-stone-700 mb-1">Titre *</label>
            <input type="text" id="form-title" required
              class="w-full px-3 py-2 border border-stone-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-amber-500">
          </div>

          <!-- Category + Difficulty row -->
          <div class="grid grid-cols-2 gap-4 mb-6">
            <div>
              <label class="block text-sm font-medium text-stone-700 mb-1">Catégorie *</label>
              <div class="flex gap-2">
                <select id="form-category" required onchange="onCategorySelect()"
                  class="flex-1 px-3 py-2 border border-stone-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-amber-500">
                </select>
                <button type="button" onclick="showAddCategory()" title="Nouvelle catégorie"
                  class="px-3 py-2 text-amber-600 hover:bg-amber-50 rounded-lg border border-stone-300 text-lg font-bold">+</button>
              </div>
              <div id="new-category-row" class="hidden mt-2 flex gap-2">
                <input type="text" id="form-new-category" placeholder="Nom de la catégorie"
                  class="flex-1 px-3 py-2 border border-stone-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-amber-500">
                <input type="text" id="form-new-category-label" placeholder="Label affiché"
                  class="flex-1 px-3 py-2 border border-stone-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-amber-500">
                <button type="button" onclick="confirmNewCategory()"
                  class="px-3 py-2 bg-amber-600 text-white rounded-lg text-sm">OK</button>
                <button type="button" onclick="hideAddCategory()"
                  class="px-3 py-2 text-stone-400 hover:text-stone-600 text-sm">✕</button>
              </div>
            </div>
            <div>
              <label class="block text-sm font-medium text-stone-700 mb-1">Difficulté</label>
              <select id="form-difficulty"
                class="w-full px-3 py-2 border border-stone-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-amber-500">
                <option value="">—</option>
                <option value="Facile">Facile</option>
                <option value="Moyen">Moyen</option>
                <option value="Difficile">Difficile</option>
              </select>
            </div>
          </div>

          <!-- Times + Servings row -->
          <div class="grid grid-cols-3 gap-4 mb-6">
            <div>
              <label class="block text-sm font-medium text-stone-700 mb-1">Préparation (min)</label>
              <input type="number" id="form-prepTime" min="0"
                class="w-full px-3 py-2 border border-stone-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-amber-500">
            </div>
            <div>
              <label class="block text-sm font-medium text-stone-700 mb-1">Cuisson (min)</label>
              <input type="number" id="form-cookTime" min="0"
                class="w-full px-3 py-2 border border-stone-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-amber-500">
            </div>
            <div>
              <label class="block text-sm font-medium text-stone-700 mb-1">Portions</label>
              <input type="number" id="form-servings" min="0"
                class="w-full px-3 py-2 border border-stone-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-amber-500">
            </div>
          </div>

          <!-- Excerpt -->
          <div class="mb-6">
            <label class="block text-sm font-medium text-stone-700 mb-1">Résumé</label>
            <textarea id="form-excerpt" rows="2"
              class="w-full px-3 py-2 border border-stone-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-amber-500"></textarea>
          </div>

          <!-- Ingredients -->
          <div class="mb-6">
            <label class="block text-sm font-medium text-stone-700 mb-1">Ingrédients</label>
            <div id="ingredients-list" class="space-y-2 mb-2"></div>
            <button type="button" onclick="addIngredient()"
              class="text-amber-600 hover:text-amber-800 text-sm font-medium">+ Ajouter un ingrédient</button>
          </div>

          <!-- Steps -->
          <div class="mb-6">
            <label class="block text-sm font-medium text-stone-700 mb-1">Étapes</label>
            <div id="steps-list" class="step-list space-y-2 mb-2"></div>
            <button type="button" onclick="addStep()"
              class="text-amber-600 hover:text-amber-800 text-sm font-medium">+ Ajouter une étape</button>
          </div>

          <!-- Slug (filename) -->
          <div class="mb-6">
            <label class="block text-sm font-medium text-stone-700 mb-1">Slug (nom du fichier)</label>
            <div class="flex items-center gap-2">
              <input type="text" id="form-slug-edit"
                class="flex-1 px-3 py-2 border border-stone-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-amber-500 font-mono text-sm"
                placeholder="Ex: FGo03-01 ou gateau-orange">
              <span class="text-xs text-stone-400">.md</span>
            </div>
            <p class="text-xs text-stone-400 mt-1">Laissez vide pour auto-générer depuis le titre. C'est le nom du fichier sur disque.</p>
          </div>

          <!-- Notes -->
          <div class="mb-6">
            <label class="block text-sm font-medium text-stone-700 mb-1">Notes</label>
            <textarea id="form-notes" rows="2"
              class="w-full px-3 py-2 border border-stone-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-amber-500"></textarea>
          </div>

          <!-- Actions -->
          <div class="flex items-center gap-4 pt-4 border-t border-stone-200">
            <button type="submit"
              class="bg-amber-600 hover:bg-amber-700 text-white px-6 py-2 rounded-lg font-medium">
              💾 Sauvegarder
            </button>
            <button type="button" onclick="cancelEdit()"
              class="text-stone-500 hover:text-stone-700 px-4 py-2">
              Annuler
            </button>
            <button type="button" id="delete-btn" onclick="deleteRecipe()" class="hidden ml-auto text-red-500 hover:text-red-700 px-4 py-2 text-sm">
              🗑 Supprimer
            </button>
          </div>
        </form>
      </div>
    </main>
  </div>

  <script>
    let allRecipes = [];
    let activeSlug = null;
    let categories = new Map(); // key -> label

    // --- API ---
    async function fetchRecipes() {
      const res = await fetch('/api/recipes');
      const data = await res.json();
      allRecipes = data.recipes || [];

      // Build categories map from existing recipes
      categories.clear();
      allRecipes.forEach(r => {
        if (r.category && r.categoryLabel) {
          categories.set(r.category, r.categoryLabel);
        } else if (r.category) {
          const label = r.category.charAt(0).toUpperCase() + r.category.slice(1);
          categories.set(r.category, label);
        }
      });

      renderTree();
    }

    async function fetchRecipe(slug) {
      const res = await fetch(`/api/recipes/${slug}`);
      if (!res.ok) return null;
      return res.json();
    }

    async function saveRecipe(e) {
      e.preventDefault();
      const originalSlug = document.getElementById('form-slug').value;
      const customSlug = document.getElementById('form-slug-edit').value.trim();
      const catKey = document.getElementById('form-category').value;
      const catLabel = categories.get(catKey) || catKey.charAt(0).toUpperCase() + catKey.slice(1);

      const data = {
        title: document.getElementById('form-title').value,
        category: catKey,
        category_label: catLabel,
        excerpt: document.getElementById('form-excerpt').value || null,
        prep_time: intVal('form-prepTime'),
        cook_time: intVal('form-cookTime'),
        servings: intVal('form-servings'),
        difficulty: document.getElementById('form-difficulty').value || null,
        ingredients: collectIngredients(),
        notes: document.getElementById('form-notes').value || null,
        steps: collectSteps(),
      };

      // If editing and slug changed, we need to delete old + create new
      if (originalSlug && customSlug && customSlug !== originalSlug) {
        // Delete old, then create with new slug
        await fetch(`/api/recipes/${originalSlug}`, { method: 'DELETE' });
        const res = await fetch('/api/recipes', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ ...data, slug: customSlug }),
        });
        if (!res.ok) {
          const err = await res.json();
          alert('Erreur: ' + (err.error || res.statusText));
          return;
        }
      } else {
        const slug = customSlug || originalSlug;
        const url = slug ? `/api/recipes/${slug}` : '/api/recipes';
        const res = await fetch(url, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data),
        });

        if (!res.ok) {
          const err = await res.json();
          alert('Erreur: ' + (err.error || res.statusText));
          return;
        }
      }

      await fetchRecipes();
      cancelEdit();
    }

    async function deleteRecipe() {
      const slug = document.getElementById('form-slug').value;
      if (!slug) return;
      if (!confirm('Supprimer cette recette ?')) return;

      const res = await fetch(`/api/recipes/${slug}`, { method: 'DELETE' });
      if (res.ok) {
        await fetchRecipes();
        cancelEdit();
      }
    }

    // --- Tree view ---
    function renderTree() {
      const search = document.getElementById('search').value.toLowerCase();
      const filtered = allRecipes.filter(r =>
        r.title.toLowerCase().includes(search) ||
        (r.categoryLabel || r.category).toLowerCase().includes(search)
      );

      // Group by category
      const grouped = new Map();
      filtered.forEach(r => {
        const cat = r.categoryLabel || r.category || 'Autres';
        if (!grouped.has(cat)) grouped.set(cat, []);
        grouped.get(cat).push(r);
      });

      // Sort categories alphabetically, recipes by title
      const sortedCats = [...grouped.keys()].sort((a, b) => a.localeCompare(b, 'fr'));
      sortedCats.forEach(cat => {
        grouped.get(cat).sort((a, b) => a.title.localeCompare(b.title, 'fr'));
      });

      const container = document.getElementById('recipe-tree');
      const total = allRecipes.length;

      let html = `
        <div class="tree-toggle flex items-center justify-between px-4 py-2 border-b border-stone-100" onclick="toggleTreeAll()">
          <span class="text-xs font-medium text-stone-500 uppercase tracking-wider">Toutes les recettes</span>
          <span class="text-xs text-stone-400">${total}</span>
        </div>
      `;

      sortedCats.forEach((cat, idx) => {
        const recipes = grouped.get(cat);
        const catKey = recipes[0]?.category || 'autres';
        const catId = `cat-${catKey.replace(/[^a-z0-9]/gi, '-')}`;
        const isActive = recipes.some(r => r.slug === activeSlug);

        html += `
          <div>
            <div class="tree-toggle flex items-center justify-between px-4 py-2 border-b border-stone-50"
                 onclick="toggleTree('${catId}')">
              <div class="flex items-center gap-2">
                <span class="chevron" id="chevron-${catId}">▼</span>
                <span class="text-sm font-medium text-stone-700">${esc(cat)}</span>
              </div>
              <span class="text-xs text-stone-400">${recipes.length}</span>
            </div>
            <div class="tree-children" id="children-${catId}">
              ${recipes.map(r => `
                <button onclick="editRecipe('${r.slug}')"
                  class="tree-recipe w-full text-left pl-10 pr-4 py-2 border-b border-stone-50 transition-colors ${r.slug === activeSlug ? 'active' : ''}">
                  <div class="text-sm text-stone-800">${esc(r.title)}</div>
                  ${r.difficulty ? `<span class="text-xs text-stone-400">${esc(r.difficulty)}</span>` : ''}
                </button>
              `).join('')}
            </div>
          </div>
        `;
      });

      container.innerHTML = html;
      updateCategoryDropdown();
    }

    function toggleTree(catId) {
      const children = document.getElementById(`children-${catId}`);
      const chevron = document.getElementById(`chevron-${catId}`);
      if (children && chevron) {
        children.classList.toggle('collapsed');
        chevron.classList.toggle('collapsed');
      }
    }

    function toggleTreeAll() {
      const allChildren = document.querySelectorAll('.tree-children');
      const allChevrons = document.querySelectorAll('.chevron');
      const allCollapsed = [...allChildren].every(c => c.classList.contains('collapsed'));

      allChildren.forEach(c => c.classList.toggle('collapsed', !allCollapsed));
      allChevrons.forEach(c => c.classList.toggle('collapsed', !allCollapsed));
    }

    function filterRecipes() { renderTree(); }

    // --- Category dropdown ---
    function updateCategoryDropdown() {
      const select = document.getElementById('form-category');
      const currentVal = select.value;
      select.innerHTML = '';

      // Add existing categories
      const sorted = [...categories.entries()].sort((a, b) => a[1].localeCompare(b[1], 'fr'));
      sorted.forEach(([key, label]) => {
        const opt = document.createElement('option');
        opt.value = key;
        opt.textContent = label;
        select.appendChild(opt);
      });

      // Restore selection
      if (currentVal && [...categories.keys()].includes(currentVal)) {
        select.value = currentVal;
      }
    }

    function onCategorySelect() {
      // Just update — the dropdown is already populated
    }

    function showAddCategory() {
      document.getElementById('new-category-row').classList.remove('hidden');
      document.getElementById('form-new-category').focus();
    }

    function hideAddCategory() {
      document.getElementById('new-category-row').classList.add('hidden');
      document.getElementById('form-new-category').value = '';
      document.getElementById('form-new-category-label').value = '';
    }

    function confirmNewCategory() {
      const key = document.getElementById('form-new-category').value.trim().toLowerCase()
        .replace(/[^a-z0-9àâäéèêëîïôöùûüç\s-]/gi, '')
        .replace(/\s+/g, '-');
      const label = document.getElementById('form-new-category-label').value.trim()
        || key.charAt(0).toUpperCase() + key.slice(1);

      if (!key) return;

      categories.set(key, label);
      updateCategoryDropdown();
      document.getElementById('form-category').value = key;
      hideAddCategory();
    }

    // --- Form ---
    function showNewRecipe() {
      activeSlug = null;
      document.getElementById('form-slug').value = '';
      document.getElementById('form-slug-edit').value = '';
      document.getElementById('recipe-form').reset();
      document.getElementById('ingredients-list').innerHTML = '';
      document.getElementById('steps-list').innerHTML = '';
      document.getElementById('delete-btn').classList.add('hidden');
      hideAddCategory();
      showForm();
      renderTree(); // refresh active state
    }

    async function editRecipe(slug) {
      const recipe = await fetchRecipe(slug);
      if (!recipe) return;

      activeSlug = slug;
      document.getElementById('form-slug').value = recipe.slug;
      document.getElementById('form-slug-edit').value = recipe.slug || '';
      document.getElementById('form-title').value = recipe.title || '';
      document.getElementById('form-category').value = recipe.category || 'desserts';
      document.getElementById('form-difficulty').value = recipe.difficulty || '';
      document.getElementById('form-prepTime').value = recipe.prepTime || '';
      document.getElementById('form-cookTime').value = recipe.cookTime || '';
      document.getElementById('form-servings').value = recipe.servings || '';
      document.getElementById('form-excerpt').value = recipe.excerpt || '';
      document.getElementById('form-notes').value = recipe.notes || '';

      // Ingredients
      const ingList = document.getElementById('ingredients-list');
      ingList.innerHTML = '';
      (recipe.ingredients || []).forEach(ing => addIngredient(ing));

      // Steps
      const stepList = document.getElementById('steps-list');
      stepList.innerHTML = '';
      (recipe.steps || []).forEach(step => addStep(step));

      document.getElementById('delete-btn').classList.remove('hidden');
      hideAddCategory();
      showForm();
      renderTree(); // refresh active state
    }

    function showForm() {
      document.getElementById('empty-state').classList.add('hidden');
      document.getElementById('form-container').classList.remove('hidden');
    }

    function cancelEdit() {
      activeSlug = null;
      document.getElementById('empty-state').classList.remove('hidden');
      document.getElementById('form-container').classList.add('hidden');
      renderTree();
    }

    // --- Dynamic lists ---
    function addIngredient(value = '') {
      const div = document.createElement('div');
      div.className = 'flex gap-2';
      div.innerHTML = `
        <input type="text" value="${esc(value)}" placeholder="200g de farine"
          class="flex-1 px-3 py-2 border border-stone-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-amber-500">
        <button type="button" onclick="this.parentElement.remove()"
          class="text-stone-400 hover:text-red-500 px-2">✕</button>
      `;
      document.getElementById('ingredients-list').appendChild(div);
    }

    function addStep(value = '') {
      const div = document.createElement('div');
      div.className = 'step-input flex gap-2';
      div.innerHTML = `
        <input type="text" value="${esc(value)}" placeholder="Mélanger le tout..."
          class="flex-1 px-3 py-2 border border-stone-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-amber-500">
        <button type="button" onclick="this.parentElement.remove()"
          class="text-stone-400 hover:text-red-500 px-2">✕</button>
      `;
      document.getElementById('steps-list').appendChild(div);
    }

    function collectIngredients() {
      return [...document.querySelectorAll('#ingredients-list input')].map(i => i.value).filter(v => v.trim());
    }

    function collectSteps() {
      return [...document.querySelectorAll('#steps-list input')].map(i => i.value).filter(v => v.trim());
    }

    // --- Helpers ---
    function intVal(id) {
      const v = document.getElementById(id).value;
      return v ? parseInt(v) : null;
    }

    function esc(s) {
      if (!s) return '';
      const d = document.createElement('div');
      d.textContent = s;
      return d.innerHTML;
    }

    // --- Init ---
    fetchRecipes();
  </script>
</body>
</html>
